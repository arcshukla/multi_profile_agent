<!-- Tab 1: Profile Registry -->
<div class="space-y-5">

  <!-- Header + Create button -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-gray-900">Profile Registry</h1>
      <p class="text-sm text-gray-500 mt-0.5">Manage all AI agent profiles</p>
    </div>
    <button
      onclick="document.getElementById('create-modal').classList.remove('hidden')"
      class="inline-flex items-center gap-2 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      New Profile
    </button>
  </div>

  <!-- Filter bar -->
  <div class="bg-white rounded-xl border border-gray-200 p-4">
    <form
      hx-get="/admin/registry/profiles"
      hx-target="#profiles-table"
      hx-trigger="input delay:400ms from:find input, change from:find select, submit"
      hx-swap="innerHTML"
      class="flex flex-wrap gap-3"
    >
      <input
        name="name" placeholder="Filter by name…"
        class="flex-1 min-w-[160px] text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <input
        name="slug" placeholder="Filter by slug…"
        class="flex-1 min-w-[160px] text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <select
        name="status"
        class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      >
        <option value="">All statuses</option>
        <option value="enabled">Enabled</option>
        <option value="disabled">Disabled</option>
        <option value="deleted">Deleted</option>
      </select>
    </form>
  </div>

  <!-- Profiles table -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div id="profiles-table"
      hx-get="/admin/registry/profiles"
      hx-trigger="load"
      hx-swap="innerHTML"
    >
      <div class="p-8 text-center text-gray-400 text-sm">Loading profiles…</div>
    </div>
  </div>
</div>

<!-- Create Profile Modal -->
<div id="create-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 fade-in">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-gray-900">Create New Profile</h2>
      <button onclick="document.getElementById('create-modal').classList.add('hidden')"
        class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <form
      hx-post="/admin/registry/create"
      hx-target="#profiles-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful){ document.getElementById('create-modal').classList.add('hidden'); this.reset(); }"
      class="space-y-4"
    >
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
        <input name="name" required placeholder="e.g. Archana Shukla"
          class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <p class="text-xs text-gray-400 mt-1">Slug will be auto-generated from the name</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Owner Email <span class="text-red-500">*</span></label>
        <input name="owner_email" type="email" required placeholder="owner@gmail.com"
          class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <p class="text-xs text-gray-400 mt-1">Owner will log in with this Google account</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status"
          class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="enabled">Enabled</option>
          <option value="disabled">Disabled</option>
        </select>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button"
          onclick="document.getElementById('create-modal').classList.add('hidden')"
          class="flex-1 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 px-4 py-2.5 rounded-lg transition-colors">
          Cancel
        </button>
        <button type="submit"
          class="flex-1 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-2.5 rounded-lg transition-colors">
          Create Profile
        </button>
      </div>
    </form>
  </div>
</div>
