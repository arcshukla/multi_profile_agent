<!-- System: Deleted Profiles partial -->
<div class="space-y-4">
  <h2 class="text-sm font-semibold text-gray-700">Deleted Profiles</h2>
  {% if profiles %}
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Name</th>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Slug</th>
          <th class="px-5 py-3"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {% for p in profiles %}
        <tr class="hover:bg-gray-50 transition-colors" id="deleted-row-{{ p.slug }}">
          <td class="px-5 py-3 font-medium text-gray-900">{{ p.name }}</td>
          <td class="px-5 py-3 font-mono text-xs text-gray-500">{{ p.slug }}</td>
          <td class="px-5 py-3">
            <div class="flex gap-2 justify-end">
              <button
                hx-post="/api/profiles/{{ p.slug }}/restore"
                hx-target="#deleted-row-{{ p.slug }}"
                hx-swap="outerHTML"
                hx-on::after-request="showToast('Profile restored!')"
                class="text-xs font-medium text-green-700 bg-green-50 hover:bg-green-100 px-2.5 py-1 rounded-lg transition-colors">
                Restore
              </button>
              <button
                hx-delete="/api/profiles/{{ p.slug }}"
                hx-confirm="Permanently delete '{{ p.name }}' and ALL files? This cannot be undone."
                hx-target="#deleted-row-{{ p.slug }}"
                hx-swap="outerHTML"
                hx-on::after-request="showToast('Profile permanently deleted', 'error')"
                class="text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 px-2.5 py-1 rounded-lg transition-colors">
                Delete Forever
              </button>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% else %}
  <div class="bg-white rounded-xl border border-gray-200 p-10 text-center">
    <p class="text-gray-400 text-sm">No deleted profiles.</p>
  </div>
  {% endif %}
</div>
