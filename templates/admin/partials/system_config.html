<!-- System: Configuration partial -->
<div class="space-y-5">
  <h2 class="text-sm font-semibold text-gray-700">Configuration</h2>

  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Setting</th>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Value</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 font-mono text-xs">
        {% for key, val in config.items() %}
        <tr class="hover:bg-gray-50">
          <td class="px-5 py-3 text-gray-500">{{ key }}</td>
          <td class="px-5 py-3 text-gray-900">{{ val }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
    <p class="text-sm text-amber-800">
      <strong>Note:</strong> Configuration is read from <code class="bg-amber-100 px-1 rounded">.env</code> at startup.
      Restart the server after changing environment variables.
    </p>
  </div>
</div>
