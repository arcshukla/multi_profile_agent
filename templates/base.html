<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Profile Platform{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900">
  {% block body %}{% endblock %}
  <script>
    // HTMX global error handler
    document.body.addEventListener('htmx:responseError', function(evt) {
      console.error('HTMX error:', evt.detail);
      const msg = evt.detail.xhr?.responseText || 'An error occurred';
      showToast(msg, 'error');
    });

    function showToast(message, type = 'success') {
      const isError = type === 'error';
      const toast = document.createElement('div');

      // Positioning + shape
      toast.style.cssText = [
        'position:fixed',
        'top:1.5rem',
        'left:50%',
        'transform:translateX(-50%) translateY(-8px)',
        'z-index:9999',
        'max-width:28rem',
        'width:calc(100% - 2rem)',
        'display:flex',
        'align-items:flex-start',
        'gap:0.625rem',
        'padding:0.875rem 1rem',
        'border-radius:0.75rem',
        'box-shadow:0 8px 24px rgba(0,0,0,0.12)',
        'font-size:0.875rem',
        'font-weight:500',
        'line-height:1.4',
        'opacity:0',
        'transition:opacity 0.2s ease, transform 0.2s ease',
        isError
          ? 'background:#fef2f2;border:1px solid #fecaca;color:#991b1b'
          : 'background:#f0fdf4;border:1px solid #bbf7d0;color:#166534',
      ].join(';');

      // Icon
      const icon = document.createElement('span');
      icon.style.cssText = `flex-shrink:0;font-weight:700;font-size:1rem;line-height:1.4;color:${isError ? '#dc2626' : '#16a34a'}`;
      icon.textContent = isError ? '✕' : '✓';

      // Message
      const text = document.createElement('span');
      text.style.cssText = 'flex:1;word-break:break-word';
      text.textContent = message;

      toast.appendChild(icon);
      toast.appendChild(text);
      document.body.appendChild(toast);

      // Animate in
      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      });

      // Animate out then remove
      const duration = isError ? 5000 : 3500;
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-8px)';
        setTimeout(() => toast.remove(), 200);
      }, duration);
    }

    // Listen for custom toast events from HTMX responses
    document.body.addEventListener('showToast', function(evt) {
      showToast(evt.detail.message, evt.detail.type || 'success');
    });
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
