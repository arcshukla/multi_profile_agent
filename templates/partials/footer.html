<!-- ── Site footer — included by every layout/page ─────────────────────────
     Variables used (all available via Jinja2 globals or route context):
       support_email  — always available (Jinja2 global)
       user           — optional; when present and truthy, Sign out is shown
──────────────────────────────────────────────────────────────────────────── -->
<footer class="bg-white border-t border-gray-200 py-3 flex-shrink-0">
  <div class="max-w-7xl mx-auto px-6 flex flex-wrap items-center justify-between gap-2 text-xs text-gray-500">

    <span class="font-medium text-gray-600">
      © 2026 AI Profile Platform™
      <span class="font-normal text-gray-400 ml-1">All rights reserved.</span>
    </span>

    <a href="/explore"
      class="text-indigo-500 hover:text-indigo-700 transition-colors">Explore More Profiles</a>

    <span class="flex items-center gap-1 flex-wrap">
      Questions?
      <a href="mailto:{{ support_email }}"
        class="text-indigo-500 hover:text-indigo-700 transition-colors">{{ support_email }}</a>
      {% if user and not hide_footer_signout %}
      <span class="text-gray-300 mx-1">·</span>
      <a href="/auth/logout"
        class="text-red-400 hover:text-red-600 transition-colors">Sign out</a>
      {% endif %}
    </span>

  </div>
</footer>
